<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>周杰伦 · 演唱会卡通场景</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand__title">周杰伦 · 演唱会之夜</div>
          <div class="brand__sub">舞台中央 · 情侣观众在下方</div>
        </div>
        <div class="controls">
          <button class="btn" id="btnMusic" type="button" aria-pressed="false">
            背景音乐：未加载
          </button>
          <button class="btn btn--ghost" id="btnLights" type="button" aria-pressed="true">
            灯光：开
          </button>
        </div>
      </header>

      <main class="stage" aria-label="演唱会场景">
        <section class="arena" aria-label="舞台与观众">
          <div class="sky">
            <div class="cloud cloud--1"></div>
            <div class="cloud cloud--2"></div>
            <div class="cloud cloud--3"></div>
            <div class="shooting shooting--1"></div>
            <div class="shooting shooting--2"></div>
          </div>

          <div class="lights" aria-hidden="true">
            <div class="beam beam--1"></div>
            <div class="beam beam--2"></div>
            <div class="beam beam--3"></div>
            <div class="beam beam--4"></div>
            <div class="beam beam--5"></div>
          </div>

          <div class="screen">
            <div class="screen__title">JAY · LIVE</div>
            <div class="screen__line" id="screenLine">点击周杰伦本人，他就开始唱歌。</div>
          </div>

          <div class="platform">
            <div class="platform__edge"></div>

            <button
              class="jay"
              id="jay"
              type="button"
              aria-label="周杰伦（点击开始唱歌/暂停）"
            >
              <div class="jay__halo"></div>
              <div class="jay__body">
                <div class="jay__head">
                  <div class="jay__hair"></div>
                  <div class="jay__face">
                    <div class="jay__brow"></div>
                    <div class="jay__eyes">
                      <span class="jay__eye"></span>
                      <span class="jay__eye"></span>
                    </div>
                    <div class="jay__mouth" aria-hidden="true"></div>
                  </div>
                </div>
                <div class="jay__torso"></div>
                <div class="jay__arm jay__arm--left"></div>
                <div class="jay__arm jay__arm--right"></div>
                <div class="jay__leg jay__leg--left"></div>
                <div class="jay__leg jay__leg--right"></div>
              </div>
              <div class="mic" aria-hidden="true">
                <div class="mic__head"></div>
                <div class="mic__stick"></div>
                <div class="mic__wire"></div>
              </div>
              <div class="lyrics" aria-hidden="true">
                <span>晴天</span>
                <span>你从不说</span>
                <span>我想你</span>
              </div>
            </button>
          </div>

          <div class="crowd" aria-label="观众区（情侣在下方）">
            <div class="row row--back">
              <div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div>
            </div>
            <div class="row row--mid">
              <div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div>
            </div>
            <div class="row row--front">
              <div class="couple" aria-label="情侣">
                <div class="person person--a">
                  <div class="person__head"></div>
                  <div class="person__hair"></div>
                  <div class="person__body"></div>
                  <div class="person__hand person__hand--right"></div>
                </div>
                <div class="person person--b">
                  <div class="person__head"></div>
                  <div class="person__hair"></div>
                  <div class="person__body"></div>
                  <div class="person__hand person__hand--left"></div>
                </div>
                <div class="heart" aria-hidden="true"></div>
              </div>
              <div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div><div class="fan"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <audio id="bgm" preload="auto" loop></audio>
    <script src="./main.js"></script>
  </body>
</html>
